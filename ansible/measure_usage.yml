---
# CPU sampling wrapper: run BenchBase and capture CPU usage from all nodes.
- hosts: lineairdb:mysql:haproxy:benchbase
  gather_facts: false
  vars:
    sample_interval: 1
    softnet_interval: 1
    interrupt_interval: 5
    run_id: "run"
    sample_dir: /tmp/metrics
    haproxy_stats_interval: 5
    enable_perf: false
    perf_freq: 99
    haproxy_stats_auth: "admin:password"
    haproxy_host: "{{ (groups.get('haproxy', []) | length > 0) | ternary(groups['haproxy'][0], '') }}"
  tasks:
    - name: Ensure sysstat installed
      become: yes
      apt:
        name: sysstat
        state: present
        update_cache: yes

    - name: Read CPU count
      command: nproc
      register: cpu_count_cmd
      changed_when: false

    - name: Set CPU count fact
      set_fact:
        cpu_count: "{{ cpu_count_cmd.stdout | int }}"

    - name: Build machine spec string (for metadata)
      set_fact:
        machine_spec: >-
          {%- set roles = ['lineairdb', 'mysql', 'haproxy', 'benchbase'] -%}
          {%- set parts = [] -%}
          {%- for role in roles -%}
            {%- set hosts = groups.get(role, []) -%}
            {%- if hosts | length > 0 -%}
              {%- set cpus = hosts | map('extract', hostvars, 'cpu_count') | list -%}
              {%- set uniq = cpus | select('defined') | map('int') | unique | list -%}
              {%- set cpu = ((uniq | length) > 0) | ternary(uniq[0], 'unknown') -%}
              {%- set _ = parts.append(role ~ '-' ~ cpu ~ 'x' ~ (hosts | length)) -%}
            {%- endif -%}
          {%- endfor -%}
          {{ parts | join('_') }}

    - name: Set result directory
      set_fact:
        result_dir: "{{ playbook_dir }}/result/{{ run_id }}/{{ machine_spec }}"

    - name: Write run metadata
      run_once: true
      delegate_to: localhost
      copy:
        dest: "{{ result_dir }}/meta.txt"
        content: |
          run_id={{ run_id }}
          machine_spec={{ machine_spec }}
          timestamp={{ lookup('pipe', 'date -Iseconds') }}

    - name: Start mpstat sampling
      when: inventory_hostname not in groups.get('haproxy', [])
      shell: |
        mkdir -p {{ sample_dir }}
        nohup mpstat -P ALL {{ sample_interval }} > {{ sample_dir }}/cpu-{{ run_id }}.log 2>&1 &
        echo $! > {{ sample_dir }}/cpu-{{ run_id }}.pid
      args:
        executable: /bin/bash

    - name: Start mpstat sampling (haproxy)
      when: haproxy_host != ''
      run_once: true
      delegate_to: "{{ haproxy_host }}"
      shell: |
        mkdir -p {{ sample_dir }}
        nohup mpstat -P ALL {{ sample_interval }} > {{ sample_dir }}/cpu-{{ run_id }}.log 2>&1 &
        echo $! > {{ sample_dir }}/cpu-{{ run_id }}.pid
      args:
        executable: /bin/bash

    - name: Start server pidstat sampling (lineairdb)
      when: inventory_hostname in groups.get('lineairdb', [])
      shell: |
        mkdir -p {{ sample_dir }}
        pid=$(pgrep -f '/build/server/lineairdb-server' | head -n1 || true)
        if [ -z "$pid" ]; then
          echo "lineairdb-server not running" > {{ sample_dir }}/pidstat-server-{{ run_id }}.log
          exit 0
        fi
        nohup pidstat -w -p "$pid" {{ sample_interval }} > {{ sample_dir }}/pidstat-server-{{ run_id }}.log 2>&1 &
        echo $! > {{ sample_dir }}/pidstat-server-{{ run_id }}.pid
      args:
        executable: /bin/bash

    - name: Start sar -w sampling (lineairdb)
      when: inventory_hostname in groups.get('lineairdb', [])
      shell: |
        mkdir -p {{ sample_dir }}
        nohup sar -w {{ sample_interval }} > {{ sample_dir }}/sar-w-{{ run_id }}.log 2>&1 &
        echo $! > {{ sample_dir }}/sar-w-{{ run_id }}.pid
      args:
        executable: /bin/bash

    - name: Start sar -n DEV sampling (lineairdb)
      when: inventory_hostname in groups.get('lineairdb', [])
      shell: |
        mkdir -p {{ sample_dir }}
        nohup sar -n DEV {{ sample_interval }} > {{ sample_dir }}/sar-dev-{{ run_id }}.log 2>&1 &
        echo $! > {{ sample_dir }}/sar-dev-{{ run_id }}.pid
      args:
        executable: /bin/bash

    - name: Start sar -n SOFT sampling (lineairdb)
      when: inventory_hostname in groups.get('lineairdb', [])
      shell: |
        mkdir -p {{ sample_dir }}
        nohup sar -n SOFT {{ softnet_interval }} > {{ sample_dir }}/sar-soft-{{ run_id }}.log 2>&1 &
        echo $! > {{ sample_dir }}/sar-soft-{{ run_id }}.pid
      args:
        executable: /bin/bash

    - name: Start mpstat -I ALL sampling (lineairdb)
      when: inventory_hostname in groups.get('lineairdb', [])
      shell: |
        mkdir -p {{ sample_dir }}
        nohup mpstat -I ALL {{ sample_interval }} > {{ sample_dir }}/mpstat-irq-{{ run_id }}.log 2>&1 &
        echo $! > {{ sample_dir }}/mpstat-irq-{{ run_id }}.pid
      args:
        executable: /bin/bash

    - name: Start softnet_stat sampling (lineairdb)
      when: inventory_hostname in groups.get('lineairdb', [])
      shell: |
        mkdir -p {{ sample_dir }}
        nohup bash -c '
        while true; do
          ts=$(date +%s)
          echo "# ts=$ts"
          cat /proc/softnet_stat
          echo
          sleep {{ softnet_interval }}
        done' > {{ sample_dir }}/softnet-{{ run_id }}.log 2>&1 &
        echo $! > {{ sample_dir }}/softnet-{{ run_id }}.pid
      args:
        executable: /bin/bash

    - name: Start /proc/interrupts sampling (lineairdb)
      when: inventory_hostname in groups.get('lineairdb', [])
      shell: |
        mkdir -p {{ sample_dir }}
        nohup bash -c '
        while true; do
          ts=$(date +%s)
          echo "# ts=$ts"
          cat /proc/interrupts
          echo
          sleep {{ interrupt_interval }}
        done' > {{ sample_dir }}/interrupts-{{ run_id }}.log 2>&1 &
        echo $! > {{ sample_dir }}/interrupts-{{ run_id }}.pid
      args:
        executable: /bin/bash

    - name: Start HAProxy stats sampling
      when: haproxy_host != ''
      run_once: true
      delegate_to: "{{ haproxy_host }}"
      shell: |
        mkdir -p {{ sample_dir }}
        nohup bash -c '
        while true; do
          ts=$(date +%s)
          echo "# ts=$ts"
          curl -s -u {{ haproxy_stats_auth }} "http://127.0.0.1:8404/stats;csv"
          echo
          sleep {{ haproxy_stats_interval }}
        done' > {{ sample_dir }}/haproxy-{{ run_id }}.csv 2>&1 &
        echo $! > {{ sample_dir }}/haproxy-{{ run_id }}.pid
      args:
        executable: /bin/bash

    - name: Start mysqld pidstat sampling (mysql)
      when: inventory_hostname in groups.get('mysql', [])
      shell: |
        mkdir -p {{ sample_dir }}
        pid=$(pgrep -f 'mysqld.*lineairdb' | head -n1 || true)
        if [ -z "$pid" ]; then
          echo "mysqld not running" > {{ sample_dir }}/pidstat-mysql-{{ run_id }}.log
          exit 0
        fi
        nohup pidstat -u -w -p "$pid" {{ sample_interval }} > {{ sample_dir }}/pidstat-mysql-{{ run_id }}.log 2>&1 &
        echo $! > {{ sample_dir }}/pidstat-mysql-{{ run_id }}.pid
      args:
        executable: /bin/bash

    - name: Start benchbase pidstat sampling (benchbase)
      when: inventory_hostname in groups.get('benchbase', [])
      shell: |
        mkdir -p {{ sample_dir }}
        nohup bash -c '
        while ! pgrep -f "[b]enchbase.jar" > /dev/null 2>&1; do sleep 1; done
        pid=$(pgrep -f "[b]enchbase.jar" | head -n1)
        pidstat -u -w -p "$pid" {{ sample_interval }}
        ' > {{ sample_dir }}/pidstat-bench-{{ run_id }}.log 2>&1 &
        echo $! > {{ sample_dir }}/pidstat-bench-{{ run_id }}.pid
      args:
        executable: /bin/bash

    - name: Start server per-thread pidstat sampling (lineairdb)
      when: inventory_hostname in groups.get('lineairdb', [])
      shell: |
        mkdir -p {{ sample_dir }}
        pid=$(pgrep -f '/build/server/lineairdb-server' | head -n1 || true)
        if [ -z "$pid" ]; then
          echo "lineairdb-server not running" > {{ sample_dir }}/pidstat-threads-{{ run_id }}.log
          exit 0
        fi
        nohup pidstat -t -u -p "$pid" 5 > {{ sample_dir }}/pidstat-threads-{{ run_id }}.log 2>&1 &
        echo $! > {{ sample_dir }}/pidstat-threads-{{ run_id }}.pid
      args:
        executable: /bin/bash

    - name: Start vmstat sampling (all nodes)
      shell: |
        mkdir -p {{ sample_dir }}
        nohup vmstat {{ sample_interval }} > {{ sample_dir }}/vmstat-{{ run_id }}.log 2>&1 &
        echo $! > {{ sample_dir }}/vmstat-{{ run_id }}.pid
      args:
        executable: /bin/bash

    - name: Install perf and configure sysctl (lineairdb + mysql)
      when: (enable_perf | bool) and (inventory_hostname in groups.get('lineairdb', []) + groups.get('mysql', []))
      become: yes
      shell: |
        apt-get install -y -qq linux-tools-aws 2>/dev/null || true
        sysctl -w kernel.perf_event_paranoid=0
        sysctl -w kernel.kptr_restrict=0
      args:
        executable: /bin/bash

    - name: Detect perf binary path (lineairdb + mysql)
      when: (enable_perf | bool) and (inventory_hostname in groups.get('lineairdb', []) + groups.get('mysql', []))
      shell: |
        find /usr/lib/linux-*-tools-* -name perf -type f 2>/dev/null | head -1
      register: perf_bin_result
      args:
        executable: /bin/bash

    - name: Set perf binary fact
      when: (enable_perf | bool) and (inventory_hostname in groups.get('lineairdb', []) + groups.get('mysql', []))
      set_fact:
        perf_bin: "{{ perf_bin_result.stdout | default('') }}"

    - name: Warn if perf not found
      when: (enable_perf | bool) and (inventory_hostname in groups.get('lineairdb', []) + groups.get('mysql', [])) and (perf_bin is not defined or perf_bin == '')
      debug:
        msg: "WARNING: perf binary not found on {{ inventory_hostname }}, skipping profiling"

    - name: Start perf record on lineairdb server
      when: (enable_perf | bool) and inventory_hostname in groups.get('lineairdb', []) and (perf_bin is defined and perf_bin != '')
      shell: |
        mkdir -p {{ sample_dir }}
        pid=$(pgrep -f '/build/server/lineairdb-server' | head -n1 || true)
        if [ -z "$pid" ]; then
          echo "lineairdb-server not running, skipping perf" > {{ sample_dir }}/perf-server-{{ run_id }}.log
          exit 0
        fi
        nohup {{ perf_bin }} record -g -F {{ perf_freq }} -p "$pid" \
          -o {{ sample_dir }}/perf-server-{{ run_id }}.data \
          -- sleep 3600 > {{ sample_dir }}/perf-server-{{ run_id }}.log 2>&1 &
        echo $! > {{ sample_dir }}/perf-server-{{ run_id }}.pid
      args:
        executable: /bin/bash

    - name: Start perf record on mysqld
      when: (enable_perf | bool) and inventory_hostname in groups.get('mysql', []) and (perf_bin is defined and perf_bin != '')
      shell: |
        mkdir -p {{ sample_dir }}
        pid=$(pgrep -f 'mysqld.*lineairdb' | head -n1 || true)
        if [ -z "$pid" ]; then
          echo "mysqld not running, skipping perf" > {{ sample_dir }}/perf-proxy-{{ run_id }}.log
          exit 0
        fi
        nohup {{ perf_bin }} record -g -F {{ perf_freq }} -p "$pid" \
          -o {{ sample_dir }}/perf-proxy-{{ run_id }}.data \
          -- sleep 3600 > {{ sample_dir }}/perf-proxy-{{ run_id }}.log 2>&1 &
        echo $! > {{ sample_dir }}/perf-proxy-{{ run_id }}.pid
      args:
        executable: /bin/bash

- hosts: mysql
  gather_facts: false
  vars:
    run_id: "run"
    sample_dir: /tmp/metrics
  tasks:
    - name: Capture MySQL diagnostics BEFORE benchmark (pre)
      shell: |
        MYSQL=~/ordo/build/runtime_output_directory/mysql
        OUT={{ sample_dir }}/mysql-diag-pre-{{ run_id }}.txt
        mkdir -p {{ sample_dir }}
        {
          echo "=== SHOW TABLE STATUS ==="
          $MYSQL -u root --protocol=TCP -h 127.0.0.1 -P 3307 benchbase \
            -e "SHOW TABLE STATUS"
          echo ""
          echo "=== SHOW INDEX (all tables) ==="
          for tbl in warehouse district customer history item new_order oorder order_line stock; do
            echo "--- $tbl ---"
            $MYSQL -u root --protocol=TCP -h 127.0.0.1 -P 3307 benchbase \
              -e "SHOW INDEX FROM $tbl"
          done
          echo ""
          echo "=== EXPLAIN Delivery (customer lookup) ==="
          $MYSQL -u root --protocol=TCP -h 127.0.0.1 -P 3307 benchbase \
            -e "EXPLAIN SELECT c_id, c_balance, c_delivery_cnt FROM customer WHERE c_w_id=1 AND c_d_id=1 AND c_id=1"
          echo ""
          echo "=== EXPLAIN Payment by name ==="
          $MYSQL -u root --protocol=TCP -h 127.0.0.1 -P 3307 benchbase \
            -e "EXPLAIN SELECT c_id FROM customer WHERE c_w_id=1 AND c_d_id=1 AND c_last='BARBARBAR' ORDER BY c_first"
          echo ""
          echo "=== EXPLAIN StockLevel ==="
          $MYSQL -u root --protocol=TCP -h 127.0.0.1 -P 3307 benchbase \
            -e "EXPLAIN SELECT COUNT(DISTINCT s_i_id) FROM order_line, stock WHERE ol_w_id=1 AND ol_d_id=1 AND ol_o_id BETWEEN 1 AND 100 AND s_w_id=1 AND s_i_id=ol_i_id AND s_quantity<10"
          echo ""
          echo "=== LineairDB server variables ==="
          $MYSQL -u root --protocol=TCP -h 127.0.0.1 -P 3307 \
            -e "SHOW VARIABLES LIKE 'lineairdb%'"
        } > "$OUT" 2>&1
      args:
        executable: /bin/bash
      failed_when: false

- import_playbook: measure.yml

- hosts: lineairdb:mysql:haproxy:benchbase
  gather_facts: false
  vars:
    run_id: "run"
    sample_dir: /tmp/metrics
    enable_perf: false
    haproxy_host: "{{ (groups.get('haproxy', []) | length > 0) | ternary(groups['haproxy'][0], '') }}"
  tasks:
    # Stop perf FIRST (before any other cleanup) to ensure the target
    # process is still alive when perf flushes its data.
    - name: Stop perf and generate reports (lineairdb) [early]
      when: (enable_perf | bool) and inventory_hostname in groups.get('lineairdb', [])
      shell: |
        if [ -f {{ sample_dir }}/perf-server-{{ run_id }}.pid ]; then
          PID=$(cat {{ sample_dir }}/perf-server-{{ run_id }}.pid)
          if kill -0 "$PID" 2>/dev/null; then
            kill -INT "$PID"
            # Wait for perf to finish writing
            for i in $(seq 1 30); do
              kill -0 "$PID" 2>/dev/null || break
              sleep 1
            done
          fi
        fi
        if [ -f {{ sample_dir }}/perf-server-{{ run_id }}.data ] && \
           [ "$(stat -c%s {{ sample_dir }}/perf-server-{{ run_id }}.data 2>/dev/null)" -gt 1000 ]; then
          {{ perf_bin | default('perf') }} report -i {{ sample_dir }}/perf-server-{{ run_id }}.data \
            --stdio --no-children -g none --percent-limit 0.1 \
            > {{ sample_dir }}/perf-report-server-{{ run_id }}.txt 2>&1
          {{ perf_bin | default('perf') }} report -i {{ sample_dir }}/perf-server-{{ run_id }}.data \
            --stdio --no-children -g flat,0,caller --percent-limit 0.5 \
            > {{ sample_dir }}/perf-callers-server-{{ run_id }}.txt 2>&1
          rm -f {{ sample_dir }}/perf-server-{{ run_id }}.data
        fi
      args:
        executable: /bin/bash
      failed_when: false

    - name: Stop perf and generate reports (mysql) [early]
      when: (enable_perf | bool) and inventory_hostname in groups.get('mysql', [])
      shell: |
        if [ -f {{ sample_dir }}/perf-proxy-{{ run_id }}.pid ]; then
          PID=$(cat {{ sample_dir }}/perf-proxy-{{ run_id }}.pid)
          if kill -0 "$PID" 2>/dev/null; then
            kill -INT "$PID"
            for i in $(seq 1 30); do
              kill -0 "$PID" 2>/dev/null || break
              sleep 1
            done
          fi
        fi
        if [ -f {{ sample_dir }}/perf-proxy-{{ run_id }}.data ] && \
           [ "$(stat -c%s {{ sample_dir }}/perf-proxy-{{ run_id }}.data 2>/dev/null)" -gt 1000 ]; then
          {{ perf_bin | default('perf') }} report -i {{ sample_dir }}/perf-proxy-{{ run_id }}.data \
            --stdio --no-children -g none --percent-limit 0.1 \
            > {{ sample_dir }}/perf-report-proxy-{{ run_id }}.txt 2>&1
          {{ perf_bin | default('perf') }} report -i {{ sample_dir }}/perf-proxy-{{ run_id }}.data \
            --stdio --no-children -g flat,0,caller --percent-limit 0.5 \
            > {{ sample_dir }}/perf-callers-proxy-{{ run_id }}.txt 2>&1
          rm -f {{ sample_dir }}/perf-proxy-{{ run_id }}.data
        fi
      args:
        executable: /bin/bash
      failed_when: false

    - name: Stop mpstat sampling
      when: inventory_hostname not in groups.get('haproxy', [])
      shell: |
        if [ -f {{ sample_dir }}/cpu-{{ run_id }}.pid ]; then
          kill "$(cat {{ sample_dir }}/cpu-{{ run_id }}.pid)" || true
        fi
      args:
        executable: /bin/bash

    - name: Stop mpstat sampling (haproxy)
      when: haproxy_host != ''
      run_once: true
      delegate_to: "{{ haproxy_host }}"
      shell: |
        if [ -f {{ sample_dir }}/cpu-{{ run_id }}.pid ]; then
          kill "$(cat {{ sample_dir }}/cpu-{{ run_id }}.pid)" || true
        fi
      args:
        executable: /bin/bash

    - name: Stop server pidstat sampling (lineairdb)
      when: inventory_hostname in groups.get('lineairdb', [])
      shell: |
        if [ -f {{ sample_dir }}/pidstat-server-{{ run_id }}.pid ]; then
          kill "$(cat {{ sample_dir }}/pidstat-server-{{ run_id }}.pid)" || true
        fi
      args:
        executable: /bin/bash

    - name: Stop sar -w sampling (lineairdb)
      when: inventory_hostname in groups.get('lineairdb', [])
      shell: |
        if [ -f {{ sample_dir }}/sar-w-{{ run_id }}.pid ]; then
          kill "$(cat {{ sample_dir }}/sar-w-{{ run_id }}.pid)" || true
        fi
      args:
        executable: /bin/bash

    - name: Stop sar -n DEV sampling (lineairdb)
      when: inventory_hostname in groups.get('lineairdb', [])
      shell: |
        if [ -f {{ sample_dir }}/sar-dev-{{ run_id }}.pid ]; then
          kill "$(cat {{ sample_dir }}/sar-dev-{{ run_id }}.pid)" || true
        fi
      args:
        executable: /bin/bash

    - name: Stop sar -n SOFT sampling (lineairdb)
      when: inventory_hostname in groups.get('lineairdb', [])
      shell: |
        if [ -f {{ sample_dir }}/sar-soft-{{ run_id }}.pid ]; then
          kill "$(cat {{ sample_dir }}/sar-soft-{{ run_id }}.pid)" || true
        fi
      args:
        executable: /bin/bash

    - name: Stop mpstat -I ALL sampling (lineairdb)
      when: inventory_hostname in groups.get('lineairdb', [])
      shell: |
        if [ -f {{ sample_dir }}/mpstat-irq-{{ run_id }}.pid ]; then
          kill "$(cat {{ sample_dir }}/mpstat-irq-{{ run_id }}.pid)" || true
        fi
      args:
        executable: /bin/bash

    - name: Stop softnet_stat sampling (lineairdb)
      when: inventory_hostname in groups.get('lineairdb', [])
      shell: |
        if [ -f {{ sample_dir }}/softnet-{{ run_id }}.pid ]; then
          kill "$(cat {{ sample_dir }}/softnet-{{ run_id }}.pid)" || true
        fi
      args:
        executable: /bin/bash

    - name: Stop /proc/interrupts sampling (lineairdb)
      when: inventory_hostname in groups.get('lineairdb', [])
      shell: |
        if [ -f {{ sample_dir }}/interrupts-{{ run_id }}.pid ]; then
          kill "$(cat {{ sample_dir }}/interrupts-{{ run_id }}.pid)" || true
        fi
      args:
        executable: /bin/bash

    - name: Stop HAProxy stats sampling
      when: haproxy_host != ''
      run_once: true
      delegate_to: "{{ haproxy_host }}"
      shell: |
        if [ -f {{ sample_dir }}/haproxy-{{ run_id }}.pid ]; then
          kill "$(cat {{ sample_dir }}/haproxy-{{ run_id }}.pid)" || true
        fi
      args:
        executable: /bin/bash

    - name: Stop mysqld pidstat sampling (mysql)
      when: inventory_hostname in groups.get('mysql', [])
      shell: |
        if [ -f {{ sample_dir }}/pidstat-mysql-{{ run_id }}.pid ]; then
          kill "$(cat {{ sample_dir }}/pidstat-mysql-{{ run_id }}.pid)" || true
        fi
      args:
        executable: /bin/bash

    - name: Stop benchbase pidstat sampling (benchbase)
      when: inventory_hostname in groups.get('benchbase', [])
      shell: |
        if [ -f {{ sample_dir }}/pidstat-bench-{{ run_id }}.pid ]; then
          kill "$(cat {{ sample_dir }}/pidstat-bench-{{ run_id }}.pid)" || true
        fi
      args:
        executable: /bin/bash

    - name: Stop server per-thread pidstat sampling (lineairdb)
      when: inventory_hostname in groups.get('lineairdb', [])
      shell: |
        if [ -f {{ sample_dir }}/pidstat-threads-{{ run_id }}.pid ]; then
          kill "$(cat {{ sample_dir }}/pidstat-threads-{{ run_id }}.pid)" || true
        fi
      args:
        executable: /bin/bash

    - name: Stop vmstat sampling (all nodes)
      shell: |
        if [ -f {{ sample_dir }}/vmstat-{{ run_id }}.pid ]; then
          kill "$(cat {{ sample_dir }}/vmstat-{{ run_id }}.pid)" || true
        fi
      args:
        executable: /bin/bash

    - name: Detect perf binary path for report (lineairdb + mysql)
      when: (enable_perf | bool) and (inventory_hostname in groups.get('lineairdb', []) + groups.get('mysql', []))
      shell: |
        find /usr/lib/linux-*-tools-* -name perf -type f 2>/dev/null | head -1
      register: perf_bin_report
      args:
        executable: /bin/bash
      failed_when: false

    - name: Set perf binary fact for report
      when: (enable_perf | bool) and (inventory_hostname in groups.get('lineairdb', []) + groups.get('mysql', []))
      set_fact:
        perf_bin: "{{ perf_bin_report.stdout | default('perf') }}"

    - name: Package bench logs
      when: inventory_hostname in groups['benchbase']
      shell: |
        if [ -d {{ sample_dir }}/bench-{{ run_id }} ]; then
          tar -czf {{ sample_dir }}/bench-{{ run_id }}.tgz -C {{ sample_dir }} bench-{{ run_id }}
        fi
      args:
        executable: /bin/bash

    - name: Package LineairDB logs
      when: inventory_hostname in groups['lineairdb']
      shell: |
        if ls ~/ordo/lineairdb_logs/*.log >/dev/null 2>&1; then
          tar -czf {{ sample_dir }}/lineairdb-{{ run_id }}.tgz -C ~/ordo lineairdb_logs
        fi
      args:
        executable: /bin/bash

    - name: Capture MySQL status snapshot
      when: inventory_hostname in groups['mysql']
      shell: |
        ~/ordo/build/runtime_output_directory/mysql \
          -u root --protocol=TCP -h 127.0.0.1 -P 3307 \
          -e "SHOW GLOBAL STATUS" > {{ sample_dir }}/mysql-status-{{ run_id }}.txt
      args:
        executable: /bin/bash
      failed_when: false

    - name: Capture MySQL diagnostics AFTER benchmark (post)
      when: inventory_hostname in groups['mysql']
      shell: |
        MYSQL=~/ordo/build/runtime_output_directory/mysql
        OUT={{ sample_dir }}/mysql-diag-post-{{ run_id }}.txt
        {
          echo "=== SHOW TABLE STATUS ==="
          $MYSQL -u root --protocol=TCP -h 127.0.0.1 -P 3307 benchbase \
            -e "SHOW TABLE STATUS"
          echo ""
          echo "=== SHOW INDEX (all tables) ==="
          for tbl in warehouse district customer history item new_order oorder order_line stock; do
            echo "--- $tbl ---"
            $MYSQL -u root --protocol=TCP -h 127.0.0.1 -P 3307 benchbase \
              -e "SHOW INDEX FROM $tbl"
          done
          echo ""
          echo "=== EXPLAIN Delivery (customer lookup) ==="
          $MYSQL -u root --protocol=TCP -h 127.0.0.1 -P 3307 benchbase \
            -e "EXPLAIN SELECT c_id, c_balance, c_delivery_cnt FROM customer WHERE c_w_id=1 AND c_d_id=1 AND c_id=1"
          echo ""
          echo "=== EXPLAIN Payment by name ==="
          $MYSQL -u root --protocol=TCP -h 127.0.0.1 -P 3307 benchbase \
            -e "EXPLAIN SELECT c_id FROM customer WHERE c_w_id=1 AND c_d_id=1 AND c_last='BARBARBAR' ORDER BY c_first"
          echo ""
          echo "=== EXPLAIN StockLevel ==="
          $MYSQL -u root --protocol=TCP -h 127.0.0.1 -P 3307 benchbase \
            -e "EXPLAIN SELECT COUNT(DISTINCT s_i_id) FROM order_line, stock WHERE ol_w_id=1 AND ol_d_id=1 AND ol_o_id BETWEEN 1 AND 100 AND s_w_id=1 AND s_i_id=ol_i_id AND s_quantity<10"
          echo ""
          echo "=== LineairDB server variables ==="
          $MYSQL -u root --protocol=TCP -h 127.0.0.1 -P 3307 \
            -e "SHOW VARIABLES LIKE 'lineairdb%'"
        } > "$OUT" 2>&1
      args:
        executable: /bin/bash
      failed_when: false

    - name: Fetch cpu logs
