syntax = "proto3";

package LineairDB.Protocol;

// Identifies which RPC is being invoked.
enum OpCode {
    UNKNOWN = 0;

    // Transaction lifecycle
    TX_BEGIN_TRANSACTION = 1;
    TX_ABORT = 2;

    // Primary key operations
    TX_READ = 3;
    TX_WRITE = 4;
    TX_DELETE = 5;

    // Secondary index operations
    TX_READ_SECONDARY_INDEX = 6;
    TX_WRITE_SECONDARY_INDEX = 7;
    TX_DELETE_SECONDARY_INDEX = 8;
    TX_UPDATE_SECONDARY_INDEX = 9;

    // Primary key scan operations
    TX_GET_MATCHING_KEYS_IN_RANGE = 10;
    TX_GET_MATCHING_KEYS_AND_VALUES_IN_RANGE = 11;
    TX_GET_MATCHING_KEYS_AND_VALUES_FROM_PREFIX = 12;
    TX_FETCH_LAST_KEY_IN_RANGE = 13;
    TX_FETCH_FIRST_KEY_WITH_PREFIX = 14;
    TX_FETCH_NEXT_KEY_WITH_PREFIX = 15;

    // Secondary index scan operations
    TX_GET_MATCHING_PRIMARY_KEYS_IN_RANGE = 16;
    TX_GET_MATCHING_PRIMARY_KEYS_FROM_PREFIX = 17;
    TX_FETCH_LAST_PRIMARY_KEY_IN_SECONDARY_RANGE = 18;
    TX_FETCH_LAST_SECONDARY_ENTRY_IN_RANGE = 19;

    // Database operations
    DB_FENCE = 20;
    DB_END_TRANSACTION = 21;
    DB_CREATE_TABLE = 22;
    DB_SET_TABLE = 23;
    DB_CREATE_SECONDARY_INDEX = 24;

    // Batch operations
    TX_BATCH_READ = 25;
    TX_BATCH_WRITE = 26;

    // Combined SI scan + value fetch (replaces SI scan -> batch_read pattern).
    TX_GET_MATCHING_KEYS_AND_VALUES_IN_INDEX_RANGE = 27;
}

// Shared key-value pair used across scan responses.
message KeyValue {
    bytes key = 1;
    bytes value = 2;
}

// Secondary index entry: a secondary key and its associated primary keys.
message SecondaryIndexEntry {
    bytes secondary_key = 1;
    repeated bytes primary_keys = 2;
}

// Begin a new transaction. Returns a server-assigned transaction ID.
// Response includes current row counts for all tables so proxies can
// feed accurate cardinalities to the MySQL optimizer.
message TxBeginTransaction {
    message Request {}
    message Response {
        int64 transaction_id = 1;
        repeated TableRowCount table_stats = 2;
    }
}

// Abort a transaction.
message TxAbort {
    message Request {
        int64 transaction_id = 1;
    }
    message Response {}
}

// Read multiple values by primary key in a single round-trip.
// Used by MRR (Multi-Range Read) to batch JOIN lookups.
message TxBatchRead {
    message Request {
        int64 transaction_id = 1;
        repeated bytes keys = 2;
        string table_name = 3;
    }
    message ReadResult {
        bool found = 1;
        bytes value = 2;
    }
    message Response {
        repeated ReadResult results = 1;
        bool is_aborted = 2;
    }
}

// Write multiple rows in a single round-trip.
// Each row includes a PK write and optional secondary index writes.
// Used by bulk load to reduce RPC round-trips.
message TxBatchWrite {
    message WriteOp {
        bytes key = 1;
        bytes value = 2;
    }
    message SecondaryIndexOp {
        string index_name = 1;
        bytes secondary_key = 2;
        bytes primary_key = 3;
    }
    message Request {
        int64 transaction_id = 1;
        string table_name = 2;
        repeated WriteOp writes = 3;
        repeated SecondaryIndexOp secondary_index_writes = 4;
    }
    message Response {
        bool success = 1;
        bool is_aborted = 2;
    }
}

// Read a single value by primary key.
message TxRead {
    message Request {
        int64 transaction_id = 1;
        bytes key = 2;
        string table_name = 4;
    }
    message Response {
        bool found = 1;
        bytes value = 2;
        bool is_aborted = 3;
    }
}

// Write a value by primary key.
message TxWrite {
    message Request {
        int64 transaction_id = 1;
        bytes key = 2;
        bytes value = 3;
        string table_name = 5;
    }
    message Response {
        bool success = 1;
        bool is_aborted = 2;
    }
}

// Wait for all pending transactions to be durably committed.
message DbFence {
    message Request {}
    message Response {}
}

// Row-count delta reported by proxy on commit (piggybacked on EndTransaction).
message TableRowDelta {
    string table_name = 1;
    int64 delta = 2;
}

// Snapshot of a single table's row count, returned by server in BEGIN/END.
message TableRowCount {
    string table_name = 1;
    int64 row_count = 2;
}

// Commit or abort a transaction.
// @param fence  If true, block until the transaction is durably committed.
// @param row_deltas  Row-count changes accumulated during this transaction.
//   Server applies these only on successful commit and returns updated
//   table_stats in the response for the proxy's next transaction.
message DbEndTransaction {
    message Request {
        int64 transaction_id = 1;
        bool fence = 2;
        repeated TableRowDelta row_deltas = 3;
    }
    message Response {
        bool is_aborted = 1;
        repeated TableRowCount table_stats = 2;
    }
}

// Delete a value by primary key.
message TxDelete {
    message Request {
        int64 transaction_id = 1;
        bytes key = 2;
        string table_name = 4;
    }
    message Response {
        bool success = 1;
        bool is_aborted = 2;
    }
}

// Read primary-key values associated with a secondary key.
// @see LineairDBTransaction::read_secondary_index()
message TxReadSecondaryIndex {
    message Request {
        int64 transaction_id = 1;
        string index_name = 2;
        bytes secondary_key = 3;
        string table_name = 4;
    }
    message Response {
        repeated bytes values = 1;
        bool is_aborted = 2;
    }
}

// Write a primary-key entry into a secondary index.
// @see LineairDBTransaction::write_secondary_index()
message TxWriteSecondaryIndex {
    message Request {
        int64 transaction_id = 1;
        string index_name = 2;
        bytes secondary_key = 3;
        bytes primary_key = 4;
        string table_name = 5;
    }
    message Response {
        bool success = 1;
        bool is_aborted = 2;
    }
}

// Remove a primary-key entry from a secondary index.
// @see LineairDBTransaction::delete_secondary_index()
message TxDeleteSecondaryIndex {
    message Request {
        int64 transaction_id = 1;
        string index_name = 2;
        bytes secondary_key = 3;
        bytes primary_key = 4;
        string table_name = 5;
    }
    message Response {
        bool success = 1;
        bool is_aborted = 2;
    }
}

// Atomically move a primary key from one secondary key to another.
// @see LineairDBTransaction::update_secondary_index()
message TxUpdateSecondaryIndex {
    message Request {
        int64 transaction_id = 1;
        string index_name = 2;
        bytes old_secondary_key = 3;
        bytes new_secondary_key = 4;
        bytes primary_key = 5;
        string table_name = 6;
    }
    message Response {
        bool success = 1;
        bool is_aborted = 2;
    }
}

// Create a new table in the database.
// @see LineairDB::Database::CreateTable()
message DbCreateTable {
    message Request {
        string table_name = 1;
    }
    message Response {
        bool success = 1;
    }
}

// Set the table context for a transaction. Subsequent operations
// within this transaction will be scoped to the specified table.
// @see LineairDB::Transaction::SetTable()
message DbSetTable {
    message Request {
        int64 transaction_id = 1;
        string table_name = 2;
    }
    message Response {
        bool success = 1;
    }
}

// Create a secondary index on a table.
// @see LineairDB::Database::CreateSecondaryIndex()
// @param index_type  0=kNone, 2=kDictUnique (LineairDB::Index::SecondaryIndexType)
message DbCreateSecondaryIndex {
    message Request {
        string table_name = 1;
        string index_name = 2;
        uint32 index_type = 3;
    }
    message Response {
        bool success = 1;
    }
}

// Scan keys in [start_key, end_key) range.
// @see LineairDBTransaction::get_matching_keys_in_range()
message TxGetMatchingKeysInRange {
    message Request {
        int64 transaction_id = 1;
        bytes start_key = 2;
        bytes end_key = 3;
        string table_name = 5;
    }
    message Response {
        repeated bytes keys = 1;
        bool is_aborted = 2;
    }
}

// Scan key-value pairs in [start_key, end_key) range.
// Skips tombstones (null/zero-length values).
// @see LineairDBTransaction::get_matching_keys_and_values_in_range()
message TxGetMatchingKeysAndValuesInRange {
    message Request {
        int64 transaction_id = 1;
        bytes start_key = 2;
        bytes end_key = 3;
        PushedPredicate filter = 5;
        string table_name = 6;
    }
    message Response {
        repeated KeyValue results = 1;
        bool is_aborted = 2;
    }
}

// Scan key-value pairs matching a prefix.
// Skips tombstones (null/zero-length values).
// @see LineairDBTransaction::get_matching_keys_and_values_from_prefix()
message TxGetMatchingKeysAndValuesFromPrefix {
    message Request {
        int64 transaction_id = 1;
        bytes prefix = 2;
        PushedPredicate filter = 3;
        string table_name = 4;
    }
    message Response {
        repeated KeyValue results = 1;
        bool is_aborted = 2;
    }
}

// Reverse scan to find the last key in [start_key, end_key) range.
// @see LineairDBTransaction::fetch_last_key_in_range()
message TxFetchLastKeyInRange {
    message Request {
        int64 transaction_id = 1;
        bytes start_key = 2;
        bytes end_key = 3;
        string table_name = 5;
    }
    message Response {
        bool found = 1;
        bytes key = 2;
        bool is_aborted = 3;
    }
}

// Find the first non-tombstone key in [prefix, prefix_end) range.
// @see LineairDBTransaction::fetch_first_key_with_prefix()
message TxFetchFirstKeyWithPrefix {
    message Request {
        int64 transaction_id = 1;
        bytes prefix = 2;
        bytes prefix_end = 3;
        string table_name = 4;
    }
    message Response {
        bool found = 1;
        bytes key = 2;
        bool is_aborted = 3;
    }
}

// Find the next non-tombstone key after last_key in [last_key, prefix_end) range.
// @see LineairDBTransaction::fetch_next_key_with_prefix()
message TxFetchNextKeyWithPrefix {
    message Request {
        int64 transaction_id = 1;
        bytes last_key = 2;
        bytes prefix_end = 3;
        string table_name = 4;
    }
    message Response {
        bool found = 1;
        bytes key = 2;
        bool is_aborted = 3;
    }
}

// Scan primary keys from a secondary index in [start_key, end_key) range.
// @see LineairDBTransaction::get_matching_primary_keys_in_range()
message TxGetMatchingPrimaryKeysInRange {
    message Request {
        int64 transaction_id = 1;
        string index_name = 2;
        bytes start_key = 3;
        bytes end_key = 4;
        string table_name = 6;
    }
    message Response {
        repeated bytes primary_keys = 1;
        bool is_aborted = 2;
    }
}

// Scan primary keys from a secondary index matching a prefix.
// @see LineairDBTransaction::get_matching_primary_keys_from_prefix()
message TxGetMatchingPrimaryKeysFromPrefix {
    message Request {
        int64 transaction_id = 1;
        string index_name = 2;
        bytes prefix = 3;
        string table_name = 4;
    }
    message Response {
        repeated bytes primary_keys = 1;
        bool is_aborted = 2;
    }
}

// Reverse scan to find the last primary key in a secondary index range
// [start_key, end_key).
// @see LineairDBTransaction::fetch_last_primary_key_in_secondary_range()
message TxFetchLastPrimaryKeyInSecondaryRange {
    message Request {
        int64 transaction_id = 1;
        string index_name = 2;
        bytes start_key = 3;
        bytes end_key = 4;
        string table_name = 6;
    }
    message Response {
        bool found = 1;
        bytes primary_key = 2;
        bool is_aborted = 3;
    }
}

// Reverse scan to find the last secondary index entry (secondary key + primary keys)
// in [start_key, end_key) range.
// @see LineairDBTransaction::fetch_last_secondary_entry_in_range()
message TxFetchLastSecondaryEntryInRange {
    message Request {
        int64 transaction_id = 1;
        string index_name = 2;
        bytes start_key = 3;
        bytes end_key = 4;
        string table_name = 6;
    }
    message Response {
        bool found = 1;
        SecondaryIndexEntry entry = 2;
        bool is_aborted = 3;
    }
}

// Predicate pushdown: recursive expression tree for server-side row filtering.
// Server evaluates this during Scan and skips non-matching rows.
// MySQL still re-evaluates all conditions (cond_push returns original cond).
message FilterExpr {
    enum Op {
        CONST_INT = 0; CONST_UINT = 1; CONST_DOUBLE = 2;
        CONST_STRING = 3; CONST_NULL = 4; COLUMN_REF = 5;
        OP_EQ = 10; OP_NE = 11; OP_LT = 12; OP_LE = 13;
        OP_GT = 14; OP_GE = 15;
        OP_AND = 20; OP_OR = 21; OP_NOT = 22;
        OP_BETWEEN = 30; OP_IN = 31; OP_LIKE = 32;
        OP_IS_NULL = 33; OP_IS_NOT_NULL = 34;
    }
    Op op = 1;
    int64 int_val = 2;
    uint64 uint_val = 3;
    double double_val = 4;
    bytes string_val = 5;
    uint32 column_index = 6;  // 0-based (COLUMN_REF用)
    uint32 compare_type = 7;  // 0=SIGNED_INT, 1=UNSIGNED_INT, 2=DOUBLE, 3=STRING
    repeated FilterExpr children = 8;
    bool negated = 9;         // BETWEEN, IN用
}

message PushedPredicate {
    FilterExpr expr = 1;
    uint32 num_columns = 2;
}

// Combined SI scan + value fetch: scan a secondary index in
// [start_key, end_key) and return (primary_key, value) pairs for every
// matching row. Replaces the 2-RPC pattern of
// (TX_GET_MATCHING_PRIMARY_KEYS_IN_RANGE -> TX_BATCH_READ) so the proxy
// pays one round-trip instead of two.
// @see LineairDBTransaction::get_matching_keys_and_values_in_index_range()
message TxGetMatchingKeysAndValuesInIndexRange {
    message Request {
        int64 transaction_id = 1;
        string table_name = 2;
        string index_name = 3;
        bytes start_key = 4;
        bytes end_key = 5;
    }
    message Response {
        repeated KeyValue results = 1;
        bool is_aborted = 2;
    }
}
