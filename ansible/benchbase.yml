---
# Schema setup and data loading for distributed benchmarks.
#
# Creates tables on each MySQL node (Ordo DDL doesn't sync across nodes)
# and loads data once (data goes to shared LineairDB storage).
#
# Usage:
#   ansible-playbook -i inventory.ini benchbase.yml
#   ansible-playbook -i inventory.ini benchbase.yml -e "bench_type=tpch bench_scalefactor=0.1"
#
# Variables (override with -e):
#   bench_type:        ycsb | tpcc | tpch     (default: ycsb)
#   bench_scalefactor: scale factor            (default: 10 for ycsb/tpcc, 0.1 for tpch)
- hosts: benchbase
  gather_facts: false
  vars:
    bench_type: ycsb
    bench_scalefactor: "{{ 0.1 if bench_type == 'tpch' else 10 }}"
    _mysql_bin: ~/ordo/build/runtime_output_directory/mysql
    _bb_dir: ~/ordo/third_party/benchbase/benchbase-mysql
    _config_dir: ~/ordo/bench/config
  tasks:
    - name: Reset benchbase database on each MySQL
      shell: |
        {{ _mysql_bin }} -u root --protocol=TCP \
          -h {{ hostvars[item].private_ip }} -P 3307 \
          -e "DROP DATABASE IF EXISTS benchbase; CREATE DATABASE benchbase;"
      args:
        executable: /bin/bash
      run_once: true
      delegate_to: "{{ groups['benchbase'][0] }}"
      loop: "{{ groups['mysql'] }}"
      loop_control:
        label: "{{ item }}"

    - name: "Create schema on each MySQL ({{ bench_type | upper }})"
      shell: |
        export SDKMAN_DIR="$HOME/.sdkman"
        [ -s "$SDKMAN_DIR/bin/sdkman-init.sh" ] && source "$SDKMAN_DIR/bin/sdkman-init.sh"
        CFG=$(mktemp /tmp/bb-create-XXXXX.xml)
        cp {{ _config_dir }}/{{ bench_type }}.xml "$CFG"
        sed -i 's|localhost:3307|{{ hostvars[item].private_ip }}:3307|g' "$CFG"
        sed -i 's|<scalefactor>[^<]*</scalefactor>|<scalefactor>{{ bench_scalefactor }}</scalefactor>|' "$CFG"
        cd {{ _bb_dir }} && java -jar benchbase.jar -b {{ bench_type }} -c "$CFG" \
          --create=true --load=false --execute=false
        rm -f "$CFG"
      args:
        executable: /bin/bash
      run_once: true
      delegate_to: "{{ groups['benchbase'][0] }}"
      loop: "{{ groups['mysql'] }}"
      loop_control:
        label: "{{ item }}"

    - name: "Load data via first MySQL ({{ bench_type | upper }}, SF={{ bench_scalefactor }})"
      shell: |
        export SDKMAN_DIR="$HOME/.sdkman"
        [ -s "$SDKMAN_DIR/bin/sdkman-init.sh" ] && source "$SDKMAN_DIR/bin/sdkman-init.sh"
        CFG=$(mktemp /tmp/bb-load-XXXXX.xml)
        cp {{ _config_dir }}/{{ bench_type }}.xml "$CFG"
        sed -i "s|localhost:3307|{{ hostvars[groups['mysql'][0]].private_ip }}:3307|g" "$CFG"
        sed -i 's|<scalefactor>[^<]*</scalefactor>|<scalefactor>{{ bench_scalefactor }}</scalefactor>|' "$CFG"
        cd {{ _bb_dir }} && java -jar benchbase.jar -b {{ bench_type }} -c "$CFG" \
          --create=false --load=true --execute=false
        rm -f "$CFG"
      args:
        executable: /bin/bash
      run_once: true
      delegate_to: "{{ groups['benchbase'][0] }}"

    - name: Set TPC-H optimizer settings on each MySQL
      when: bench_type == 'tpch'
      shell: |
        {{ _mysql_bin }} -u root --protocol=TCP \
          -h {{ hostvars[item].private_ip }} -P 3307 \
          -e "SET GLOBAL optimizer_switch='batched_key_access=on,mrr_cost_based=off,subquery_to_derived=on';
              SET GLOBAL join_buffer_size=1073741824;"
      args:
        executable: /bin/bash
      run_once: true
      delegate_to: "{{ groups['benchbase'][0] }}"
      loop: "{{ groups['mysql'] }}"
      loop_control:
        label: "{{ item }}"
